    - generic [ref=e788]: Frequently Asked Questions
    - heading "Got questions? We've got answers." [level=2] [ref=e789]:
      - text: Got questions?
      - emphasis [ref=e790]: We've got answers.
    - generic [ref=e791]:
      - generic [ref=e792]:
        - button "Do you provide free quotes?" [ref=e793] [cursor=pointer]:
          - text: Do you provide free quotes?
          - img [ref=e795]
        - region:
          - generic [ref=e797]:
            - text: Yes, absolutely — all quotes are completely free and there's no obligation whatsoever. We come to you, assess the job in person, discuss your needs and colour preferences, and provide a detailed written quote. Just call us on
            - link "0450 386 982" [ref=e798] [cursor=pointer]:
              - /url: tel:0450386982
            - text: or fill in the contact form and we'll be in touch promptly.
      - generic [ref=e799]:
        - button "How long does a typical painting job take?" [ref=e800] [cursor=pointer]:
          - text: How long does a typical painting job take?
          - img [ref=e802]
        - region:
          - generic [ref=e804]: It depends on the size and scope of the project. A single room interior can take as little as one day. A full house interior typically takes 2–4 days. A full exterior repaint usually takes 2–5 days. Commercial projects vary. We'll always give you a clear timeframe in your quote so you can plan accordingly.
      - generic [ref=e805]:
        - button "What paint brands do you use?" [ref=e806] [cursor=pointer]:
          - text: What paint brands do you use?
          - img [ref=e808]
        - region:
          - generic [ref=e810]: We use only premium Australian paint brands — primarily Dulux, Taubmans and Haymes. These are the best products available for Brisbane and Queensland's climate, delivering exceptional durability, UV resistance and colour retention. We never use cheap paint on our customers' homes or businesses.
      - generic [ref=e811]:
        - button "Are you fully insured?" [ref=e812] [cursor=pointer]:
          - text: Are you fully insured?
          - img [ref=e814]
        - region:
          - generic [ref=e816]: Yes. Paintmates carries full public liability insurance and is ABN registered. You can paint with complete peace of mind knowing you're protected. We're happy to provide proof of insurance on request.
      - generic [ref=e817]:
        - button "Do I need to move my furniture before you arrive?" [ref=e818] [cursor=pointer]:
          - text: Do I need to move my furniture before you arrive?
          - img [ref=e820]
        - region:
          - generic [ref=e822]: We handle all the preparation including moving furniture and protecting your floors, fittings and belongings with professional drop sheets and plastic sheeting. You don't need to do anything — just let us in. We also clean up completely when we're done.
      - generic [ref=e823]:
        - button "Do you do weekend or after-hours work?" [ref=e824] [cursor=pointer]:
          - text: Do you do weekend or after-hours work?
          - img [ref=e826]
        - region:
          - generic [ref=e828]: Yes — for commercial clients especially, we understand that painting during business hours can be disruptive. We offer after-hours and weekend work to minimise disruption to your business or tenants. Discuss your requirements with us when you call for your free quote.
      - generic [ref=e829]:
        - button "How do I choose the right paint colour?" [ref=e830] [cursor=pointer]:
          - text: How do I choose the right paint colour?
          - img [ref=e832]
        - region:
          - generic [ref=e834]: Our team is happy to assist you with colour selection. We can provide sample swatches and professional advice on what works best for your space, lighting conditions and Queensland's climate. We work with all standard Dulux, Taubmans and Haymes colour ranges, and can also colour-match custom colours.
      - generic [ref=e835]:
        - button "What areas do you service?" [ref=e836] [cursor=pointer]:
          - text: What areas do you service?
          - img [ref=e838]
        - region:
